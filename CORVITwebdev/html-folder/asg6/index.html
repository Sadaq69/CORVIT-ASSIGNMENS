<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment4</title>
  </head>
  <body>
    <h1>STUDENT REGISTRATION FORM</h1>
    <form>
      <label>FIRST NAME</label>
      <input type="text" /> (max 30 characters a-z and A-Z)
      <br />
      <label>LAST NAME</label>
      <input type="text" /> (max 30 characters a-z and A-Z)
      <br />
      <label>DATE OF BIRTH</label>
      <select name="day">
        <option>Day:</option>
      </select>
      <select name="month">
        <option>Month:</option>
      </select>
      <select name="Year">
        <option>Year:</option>
      </select>
      <br />
      <label>EMAIL ID</label>
      <input type="email" />
      <br />
      <label>MOBILE NUMBER</label>
      <input type="number" /> (10 digit number)
      <br />
      <label>GENDER</label>
      <label>Male</label>
      <input type="radio" name="gender" />
      <label>Female</label>
      <input type="radio" name="gender" />
      <br />
      <label>ADDRESS</label>
      <textarea cols="30" rows="4"></textarea>
      <br />
      <label>CITY</label>
      <input type="text" /> (max 30 characters a-z and A-Z)
      <br />
      <label>PIN CODE</label>
      <input type="password" /> (6 digit number)
      <br />
      <label>STATE</label>
      <input type="text" /> (max 30 characters a-z and A-Z)
      <br />
      <label>COUNTRY</label>
      <input type="text" />
      <br />
      <label>HOBBIES</label>
      <label>Drawing</label>
      <input type="checkbox" />
      <label>Singing</label>
      <input type="checkbox" />
      <label>Dancing</label>
      <input type="checkbox" />
      <label>Sketching</label>
      <input type="checkbox" />
      <label>Others</label>
      <input type="checkbox" />
      <input type="text" />
      <br/>
      <label>QUALIFICATION</label>
      <textarea cols="60" rows="8"></textarea>
      <br/>
      <label>COURSES APPLIED FOR</label>
      <label>BCA</label>
      <input type="radio" name="course" />
      <label>B.Com</label>
      <input type="radio" name="course" />
      <label>B.Sc</label>
      <input type="radio" name="course" />
      <label>B.A</label>
      <input type="radio" name="course" />
      <br />
      <button>Submit</button> <button>Reset</button>
    </form>
  </body>
</html>
