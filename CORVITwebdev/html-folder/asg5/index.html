<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Register</h1>
    <form>
      <label>First Name: </label>
      <input type="text" placeholder="John" />
      <label>Last Name: </label>
      <input type="text" placeholder="Smith" /> <br />
      Male<input type="radio" name="Gender" /> Female<input
        type="radio"
        name="Gender"
      />
      Other<input type="radio" name="Gender" /> <br />
      <label>Email:</label>
      <input type="email" placeholder="your email" />
      <label>Password:</label>
      <input type="password" placeholder="your password" /> <br />
      <label>Birthday</label>
      <select name="month">
        <option>Month</option>
        <option>Jan</option>
        <option>Feb</option>
        <option>Mar</option>
        <option>Apr</option>
        <option>May</option>
        <option>Jun</option>
        <option>July</option>
        <option>Aug</option>
        <option>Sep</option>
        <option>Oct</option>
        <option>Nov</option>
        <option>Dec</option>
      </select>
      <select name="Day">
        <option>Day</option>
        <option>1</option>
        <option>2</option>
        <option>3</option>
        <option>4</option>
        <option>5</option>
        <option>6</option>
        <option>7</option>
        <option>8</option>
        <option>9</option>
        <option>10</option>
        <option>11</option>
        <option>12</option>
        <option>13</option>
        <option>14</option>
        <option>15</option>
        <option>16</option>
        <option>17</option>
        <option>18</option>
        <option>19</option>
        <option>20</option>
        <option>21</option>
        <option>22</option>
        <option>23</option>
        <option>24</option>
        <option>25</option>
        <option>26</option>
        <option>27</option>
        <option>28</option>
        <option>29</option>
        <option>30</option>
        <option>31</option>
      </select>
      <select name="Year">
        <option>Year</option>
        <option>2000</option>
        <option>2001</option>
        <option>2003</option>
        <option>2004</option>
      </select>
      <br />
      <label>I agree to the terms and conditions</label>
      <input type="checkbox" /> <br />
      <button>Submit</button>
    </form>
  </body>
</html>
